version: "3.8"
services:
  postgres:
    mem_limit: 2048m
    memswap_limit: 2048m
    restart: unless-stopped

  api-v1-lan:
    mem_limit: 1024m
    memswap_limit: 1280m
    restart: unless-stopped

  sync-worker-lan:
    mem_limit: 2048m
    memswap_limit: 3072m
    restart: unless-stopped
    tmpfs:
      - /tmp:noexec,nosuid,size=512m

  frontend-prod-lan:
    mem_limit: 512m
    memswap_limit: 768m
    restart: unless-stopped

  reverse-proxy:
    mem_limit: 256m
    memswap_limit: 512m
    restart: unless-stopped
