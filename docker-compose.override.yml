services:
  postgres:
    mem_limit: 2048m
    memswap_limit: 2048m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-v1-lan:
    mem_limit: 1024m
    memswap_limit: 1280m
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sync-worker-lan:
    mem_limit: 2048m
    memswap_limit: 3072m
    restart: unless-stopped
    tmpfs:
      - /tmp:noexec,nosuid,size=2g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend-prod-lan:
    mem_limit: 512m
    memswap_limit: 768m
    restart: unless-stopped

  reverse-proxy:
    mem_limit: 256m
    memswap_limit: 512m
    restart: unless-stopped
