name: Docker CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
  pull_request:
  workflow_dispatch:

jobs:
  docker-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      API_V1_WORKERS: "1"
      DB_BOOTSTRAP_ON_START: "false"
      DB_DEMO_PROBE_ON_START: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: CI Environment Overrides
        shell: bash
        run: |
          cp .env.example .env
          {
            echo "API_V1_WORKERS=1"
            echo "DB_BOOTSTRAP_ON_START=false"
            echo "DB_DEMO_PROBE_ON_START=false"
            echo "DATABASE_URL=sqlite:////tmp/bi_clone_ci_app_v1.db"
          } >> .env

      - name: Docker Compose Version
        run: docker compose version

      - name: Build Image
        run: docker compose --profile dev build --no-cache api-v1

      - name: Start Services (API v1)
        run: docker compose --profile dev up -d api-v1

      - name: Compile Check
        run: docker compose --profile dev exec -T api-v1 python -m py_compile backend/app/main.py

      - name: Unit Tests
        run: |
          set -euo pipefail
          set +e
          docker compose --profile dev exec -T api-v1 sh -lc "pwd && ls -la tests && python -m unittest discover -s tests -p 'test_*.py'" > /tmp/unit-tests.log 2>&1
          rc=$?
          set -e
          cat /tmp/unit-tests.log
          if [ "$rc" -ne 0 ]; then
            short="$(tail -n 60 /tmp/unit-tests.log | tr '\n' ' ' | tr -s ' ')"
            echo "::error::Unit Tests failed: ${short}"
            exit "$rc"
          fi

      - name: API v1 Contract Tests
        run: docker compose --profile dev exec -T api-v1 python -m unittest tests.test_api_v1_brokers_config -v

      - name: Bootstrap Auth Users
        run: docker compose --profile dev exec -T api-v1 python scripts/bootstrap_auth_users.py

      - name: Smoke - Health Endpoints
        shell: bash
        run: |
          set -euo pipefail
          retry_curl() {
            local url="$1"
            local out="$2"
            for i in $(seq 1 15); do
              if curl -fsS "$url" > "$out"; then
                return 0
              fi
              sleep 2
            done
            return 1
          }
          retry_curl "http://localhost:8000/api/v1/health" /tmp/v1-health.json
          grep -q "\"ok\":true" /tmp/v1-health.json

          login_payload="$(printf '{"username":"%s","password":"%s"}' "${DEMO_ADMIN_USER:-admin}" "${DEMO_ADMIN_PASSWORD:-change_me_demo_admin_password}")"
          curl -fsS -X POST "http://localhost:8000/api/v1/auth/login" -H "Content-Type: application/json" -d "$login_payload" > /tmp/login.json
          access_token="$(python -c "import json; print(json.load(open('/tmp/login.json','r',encoding='utf-8')).get('access_token',''))")"
          test -n "$access_token"

          curl -fsS -X POST "http://localhost:8000/api/v1/analytics/portfolio-corte-v2/options" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${access_token}" \
            -d "{}" > /tmp/portfolio-options.json
          grep -q "\"meta\"" /tmp/portfolio-options.json

      - name: Export OpenAPI v1
        run: docker compose --profile dev exec -T api-v1 python scripts/export_openapi_v1.py

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Frontend Install
        working-directory: frontend
        run: npm ci

      - name: Generate OpenAPI TS Types
        working-directory: frontend
        run: npm run generate:types

      - name: Frontend Typecheck + Build
        working-directory: frontend
        run: |
          npm run typecheck
          npm run build

      - name: Logs on Failure
        if: failure()
        run: |
          docker compose --profile dev logs api-v1 --tail=400

      - name: Cleanup
        if: always()
        run: docker compose down -v
