name: Release Gates

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  security-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Secret Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend Dependency Scan (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit --requirement requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Frontend Install (security scan)
        working-directory: frontend
        run: npm ci

      - name: Frontend Dependency Scan (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high

  quality-gates:
    needs: security-gates
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      API_V1_WORKERS: "1"
      DB_BOOTSTRAP_ON_START: "false"
      DB_DEMO_PROBE_ON_START: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: CI Environment Overrides
        shell: bash
        run: |
          cp .env.example .env
          {
            echo "API_V1_WORKERS=1"
            echo "DB_BOOTSTRAP_ON_START=false"
            echo "DB_DEMO_PROBE_ON_START=false"
          } >> .env

      - name: Docker Compose Version
        run: docker compose version

      - name: Build
        run: docker compose --profile dev build --no-cache

      - name: Start Services
        run: docker compose --profile dev up -d api-v1

      - name: Backend Lint (compile/static)
        run: docker compose --profile dev exec -T api-v1 python -m py_compile backend/app/main.py

      - name: Backend Unit + Integration Tests
        run: |
          set -euo pipefail
          set +e
          docker compose --profile dev exec -T api-v1 sh -lc "pwd && ls -la tests && python -m unittest discover -s tests -p 'test_*.py'" > /tmp/unit-tests.log 2>&1
          rc=$?
          set -e
          cat /tmp/unit-tests.log
          if [ "$rc" -ne 0 ]; then
            short="$(tail -n 60 /tmp/unit-tests.log | tr '\n' ' ' | tr -s ' ')"
            echo "::error::Backend Unit + Integration Tests failed: ${short}"
            exit "$rc"
          fi

      - name: Backend Coverage
        run: |
          docker compose --profile dev run --rm -v ${{ github.workspace }}:/workspace api-v1 sh -c "
            pip install --quiet coverage &&
            cd /app && coverage run -m unittest discover -s tests -p 'test_*.py' &&
            coverage xml -o /workspace/coverage.xml &&
            coverage report --fail-under=43
          "
          # 43 = umbral actual; subir (ej. 44, 50, 60) al añadir tests

      - name: Upload Backend Coverage
        uses: actions/upload-artifact@v5
        with:
          name: backend-coverage
          path: coverage.xml

      - name: Bootstrap Auth Users
        run: docker compose --profile dev run --rm api-v1 python scripts/bootstrap_auth_users.py

      - name: Bootstrap Analytics Schema (Postgres)
        run: |
          docker compose --profile dev run --rm api-v1 python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path('/app/backend')))
          from app.db.base import Base
          from app.db.session import engine
          import app.models.brokers  # register tables on Base metadata
          Base.metadata.create_all(bind=engine)
          print('analytics schema ensured')
          "

      - name: Verify Legacy Config Migration
        run: |
          docker compose --profile dev run --rm api-v1 python scripts/migrate_legacy_config_to_db.py
          docker compose --profile dev run --rm api-v1 python scripts/verify_legacy_config_migration.py

      - name: E2E Brokers Critical Flow
        run: docker compose --profile dev run --rm -e E2E_API_BASE=http://api-v1:8000/api/v1 api-v1 python scripts/e2e_brokers_critical.py

      - name: Perf Smoke API v1
        run: docker compose --profile dev run --rm -e PERF_API_BASE=http://api-v1:8000/api/v1 -e PERF_ANALYTICS_P95_BUDGET_MS=1200 api-v1 python scripts/perf_smoke_api_v1.py

      - name: Smoke Deploy
        run: docker compose --profile dev run --rm -e SMOKE_API_V1_BASE=http://api-v1:8000/api/v1 api-v1 python scripts/smoke_deploy_v1.py

      - name: Export OpenAPI
        run: docker compose --profile dev run --rm api-v1 python scripts/export_openapi_v1.py

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Frontend Install
        working-directory: frontend
        run: npm ci

      - name: Frontend Generate API Types
        working-directory: frontend
        run: npm run generate:types

      - name: Frontend Unit + Integration
        working-directory: frontend
        run: npm run test

      - name: Frontend Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend Build
        working-directory: frontend
        run: npm run build

      - name: Cleanup
        if: always()
        run: docker compose down -v
